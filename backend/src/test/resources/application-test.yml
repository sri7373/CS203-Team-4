spring:
  datasource:
    # Use an in-memory H2 database during tests to avoid requiring a local Postgres instance.
    # The URL can still be overridden by the DB_URL environment variable if needed.
    url: ${DB_URL:jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL}
    username: ${DB_USERNAME:sa}
    password: ${DB_PASSWORD:}
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: create  # Create schema at startup
    show-sql: false
    properties:
      hibernate:
        # Run H2 in PostgreSQL compatibility mode for SQL compatibility with existing tests
        dialect: org.hibernate.dialect.H2Dialect
        format_sql: true
        jdbc:
          lob:
            non_contextual_creation: true
    open-in-view: false
    defer-datasource-initialization: true  # Wait for Hibernate to create schema first
  
  sql:
    init:
      mode: always
      schema-locations: classpath:schema.sql
      data-locations: classpath:test-data.sql,classpath:test-data-extra.sql
      continue-on-error: false

app:
  jwt:
    secret: ${JWT_SECRET:test-secret-key}
    expirationMs: ${JWT_EXPIRATION_MS:86400000}

gemini:
  api:
    key: ${GEMINI_API_KEY:test-gemini-key}

newsdata:
  api:
    key: ${NEWSDATA_API_KEY:test-newsdata-key}

logging:
  level:
    org.hibernate.SQL: WARN
    org.springframework: WARN
    org.springframework.security: WARN
