spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/tariff_test}
    username: ${DB_USERNAME:test_user}
    password: ${DB_PASSWORD:test_password}
    driver-class-name: org.postgresql.Driver
  
  jpa:
    hibernate:
      ddl-auto: create-drop  # Creates fresh schema for each test run
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        jdbc:
          lob:
            non_contextual_creation: true
    open-in-view: false
    defer-datasource-initialization: true
  
  sql:
    init:
      mode: always
      data-locations: classpath:test-data.sql

app:
  jwt:
    secret: ${JWT_SECRET:test-secret-key}
    expirationMs: ${JWT_EXPIRATION_MS:86400000}

gemini:
  api:
    key: ${GEMINI_API_KEY:test-gemini-key}

newsdata:
  api:
    key: ${NEWSDATA_API_KEY:test-newsdata-key}

logging:
  level:
    org.hibernate.SQL: WARN
    org.springframework: WARN
    org.springframework.security: WARN
