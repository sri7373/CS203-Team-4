version: '3.8'

services:
  # Backend API (connects to AWS RDS - no local database container)
  backend:
    image: ${ECR_REGISTRY}/${ECR_BACKEND_REPOSITORY}:latest
    container_name: tariff_backend_prod
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      # Database connection (AWS RDS)
      DB_URL: ${DB_URL}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      
      # JWT Security
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION_MS: 86400000
      
      # API Keys
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      NEWSDATA_API_KEY: ${NEWSDATA_API_KEY}
      
      # Spring Profile
      SPRING_PROFILES_ACTIVE: prod
    networks:
      - tariff_network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # Frontend
  frontend:
    image: ${ECR_REGISTRY}/${ECR_FRONTEND_REPOSITORY}:latest
    container_name: tariff_frontend_prod
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - tariff_network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

networks:
  tariff_network:
    driver: bridge

